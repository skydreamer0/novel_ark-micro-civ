<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Mothership Core Archive - Concepts</title>
  <style>
    :root {
      --bg: #050505;
      --term-green: #0f0;
      --term-dark: #030;
      --alert-red: #f00;
      --abyss-red: #600;
      --flesh: #300;
      --text: #eee;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif TC', serif, monospace;
      margin: 0; padding: 40px;
      line-height: 1.6;
    }
    h2 { border-bottom: 2px solid var(--abyss-red); padding-bottom: 10px; color: #ff4d4d; }
    .demo-container { display: flex; flex-direction: column; gap: 40px; margin-top: 30px; }
    .demo-item { 
      background: #100; 
      border: 1px solid var(--flesh); 
      padding: 20px; 
      position: relative;
      overflow: hidden;
      min-height: 150px;
    }
    .demo-label { 
      font-weight: bold; 
      color: #ff8080; 
      margin-bottom: 15px; 
      display: block;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* (1) Bio-barrier: 物理阻隔 (生物組織) */
    .bio-barrier {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, #400 0%, #100 100%);
      opacity: 0.95;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .vein {
      position: absolute;
      background: var(--alert-red);
      filter: blur(2px);
      opacity: 0.3;
      animation: pulse 3s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.05); }
    }

    /* (2) Blood-glitch: 數據汙染 (血色亂碼) */
    .blood-glitch {
      font-family: monospace;
      color: var(--alert-red);
      position: relative;
    }
    .glitch-text {
      animation: noise 0.5s infinite;
      display: inline-block;
    }
    @keyframes noise {
      0% { content: "§%$"; transform: translate(0); }
      20% { content: "ΔΘΞ"; transform: translate(-2px, 1px); }
      40% { content: "☣☢☠"; transform: translate(2px, -1px); }
      60% { content: "魂魄歸"; transform: translate(-1px, -2px); }
      80% { content: "ERROR"; transform: translate(1px, 2px); }
      100% { content: "0101"; transform: translate(0); }
    }

    /* (3) Mental-blur: 精神壓迫 (模糊/重影) */
    .mental-blur {
      filter: blur(8px);
      user-select: none;
      opacity: 0.5;
      animation: dizzy 4s infinite alternate;
    }
    @keyframes dizzy {
      from { filter: blur(6px); transform: rotate(0.5deg); }
      to { filter: blur(10px); transform: rotate(-0.5deg); text-shadow: 5px 0 10px red, -5px 0 10px blue; }
    }

    .secret-content { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h2>機密檔案解鎖機制：視覺演示 (Abyss UI)</h2>
  <p>當檔案處於「未解鎖」狀態時，你偏好哪種感覺？</p>

  <div class="demo-container">
    
    <div class="demo-item">
      <span class="demo-label">(1) Bio-barrier: 物理阻隔</span>
      <div class="secret-content">
        這是關於「清道夫」的母核編碼細節... 你必須擁有 V8 權限才能查看。
      </div>
      <div class="bio-barrier">
        <div class="vein" style="width:200%; height:2px; top:30%; transform:rotate(5deg);"></div>
        <div class="vein" style="width:200%; height:2px; top:60%; transform:rotate(-3deg);"></div>
        <span style="color:white; z-index:3; font-weight:bold; text-shadow: 0 0 10px red;">[ 被生物組織封鎖 ]</span>
      </div>
    </div>

    <div class="demo-item">
      <span class="demo-label">(2) Blood-glitch: 數據汙染</span>
      <p>目標身份：<span class="blood-glitch"><span class="glitch-text">數據損毀</span></span></p>
      <p>威脅等級：<span class="blood-glitch"><span class="glitch-text">不明</span></span></p>
      <div class="secret-content">這條記錄正在被母巢規則層強行改寫...</div>
    </div>

    <div class="demo-item">
      <span class="demo-label">(3) Mental-blur: 精神壓迫</span>
      <div class="mental-blur">
        <h3>最高機密：設計者遺囑</h3>
        <p>如果你能讀到這段文字，說明母艦的回收程序已經啟動。我留下的並非逃生艙，而是...</p>
      </div>
      <p style="text-align:center; color:var(--alert-red); font-size: 12px; margin-top: 10px;">> 警告：感知延遲超過 1.5s，無法解析該維度數據 <</p>
    </div>

  </div>
</body>
</html>
